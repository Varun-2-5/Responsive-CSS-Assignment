<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CSS Assignment</title>
        <style>
            body
            {
                margin: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                font-family: Arial, Helvetica, sans-serif;

            }
            .container
            {
                border: 1px solid black;
                margin: 20px;
            }
            .content
            {
                margin: 40px;
                margin-left: 0;
                display: grid;
                grid-template-columns: repeat(3,1fr);
            }
            h4
            {
                margin: 2px;
            }
            .button
            {
                display: inline-block;
                padding: 5px 12px;
                background-color: green;
                color: white;
                border-radius: 8px;
                margin-top: 4px;
            }
            .button:hover
            {
                cursor: pointer;
                background-color: rgb(165, 122, 203);
                color: black;
            }
            a
            {
                text-decoration: none;
            }
            .video
            {
                margin-left: 25px;
            }
            .main
            {
                display: flex;
                flex-direction: column;
                align-items: center;
                margin: 4px;
    
            }
            .main img
            {
                width:600px;
                height:400px;
                margin-top: 6px;
            }
            .video img
            {
                width:200px;
                height:150px;
            }
            @media(max-width:600px)
            {
                .main img 
                {
                    width: 250px;
                    height: auto;
                }
                .content
                {
                    margin: 20px; 
                    grid-template-columns: 1fr;  
                    gap: 10px;
                }
                .video
                {
                    display: flex;
                    align-items: center;
                    flex-direction: column;
                    margin-left: 0;
                }
            }
            

        </style>
    </head>
    <body>
        <div class="container">
            <div class="main">
            <h4>ARE YOU INTERESTED IN LEARNING CODING?</h4>
            <img src="pexels-hiteshchoudhary-7775641.jpg" alt="image">
            </div>
            <div class="content">
                <div class="video">
                    <img src="pexels-hiteshchoudhary-3561339.jpg">
                    <h4>Photoshop Course</h4>
                    <a href="https://youtu.be/7FvorvS_oeo?si=PR3gKit1Vr2eupZF" class="button">watch</a>
                </div>
                <div class="video">
                    <img src="pexels-hiteshchoudhary-7775639 copy 2.jpg">
                    <h4>Javascript Course</h4>
                    <a href="https://youtube.com/playlist?list=PLRAV69dS1uWSxUIk5o3vQY2-_VKsOpXLD&si=_JQD16NDyIOCFIh8" class="button">watch</a>
                </div>
                <div class="video">
                    <img src="pexels-hiteshchoudhary-7775640.jpg">
                    <h4>Python Course</h4>
                    <a href="https://youtu.be/OzSTb_5SOQw?si=oY9ZeWuCa3MBlZvk" class="button">watch</a>
                </div>
                
            </div>
        </div>

        
    </body>
</html>
